name: deploy-book

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-book:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - uses: actions/checkout@v5

    # Cache Jupyter Book build artifacts
    - name: Cache Jupyter Book build
      uses: actions/cache@v5
      with:
        path: |
          _build/
          ~/.cache/pip
        key: ${{ runner.os }}-jb-${{ hashFiles('_config.yml', '_toc.yml') }}
        restore-keys: |
          ${{ runner.os }}-jb-

    # Install dependencies
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        pip install "jupyter-book<2" ou-jupyter-book-tools
        pip install sphinxcontrib-youtube==1.3.0
    # Build the book
    - name: Build the book
      env:
        SPHINXOPTS: "-j auto"
      run: |
        jupyter-book build .

    # Deploy to GitHub Pages
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./_build/html

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4